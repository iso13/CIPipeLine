# ─────────────────────────────────────────────────────────────────────────────
# CI PIPELINE
# Runs ESLint, TypeScript type check, and Jest unit tests on every PR
# and every push to main.
#
# Branch protection (set in GitHub Settings) requires all three jobs to pass
# and 1 reviewer approval before a PR can be merged.
# Merge strategy is restricted to squash only.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  # Run on every pull request targeting main
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'       # Doc changes don't need a lint/test run
      - 'reports/**'    # Generated output — never needs CI

  # Run on every push/merge to main (post-merge safety net)
  push:
    branches:
      - main

# Cancel any in-progress run on the same branch when a new commit is pushed.
# Keeps feedback fast and avoids wasting runner minutes on stale runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── JOB 1: ESLint ──────────────────────────────────────────────────────────
  # Lints all TypeScript source and test files.
  # Any ESLint error fails this job and blocks the PR.
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'   # Caches node_modules between runs using package-lock.json

      - name: Install dependencies
        run: npm ci   # Clean install — respects package-lock.json exactly

      - name: Run ESLint
        run: npm run lint

  # ── JOB 2: TypeScript Type Check ───────────────────────────────────────────
  # Runs the TypeScript compiler in check-only mode — no output files written.
  # Catches type errors that ESLint cannot: wrong argument types,
  # missing properties, broken imports, etc.
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tsc --noEmit
        run: npx tsc --noEmit   # --noEmit = type-check only, no files written

  # ── JOB 3: Unit Tests (Jest) ───────────────────────────────────────────────
  # Runs Jest unit tests with 80% coverage enforcement.
  # Coverage report is uploaded as a workflow artifact (kept for 7 days).
  test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          CI: true   # Tells Jest to use non-interactive output format

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests failed — useful for debugging
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── SUMMARY GATE ───────────────────────────────────────────────────────────
  # A single job that all three checks must pass before this job succeeds.
  # Branch protection points at THIS job only — so adding or removing checks
  # in the future never requires updating the branch protection rules.
  ci-pass:
    name: All Checks Passed
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    if: always()   # Run even if upstream jobs failed, so we can report the result

    steps:
      - name: Evaluate results
        run: |
          if [[ "${{ needs.lint.result }}"      != "success" ||
                "${{ needs.typecheck.result }}"  != "success" ||
                "${{ needs.test.result }}"       != "success" ]]; then
            echo "One or more checks failed:"
            echo "  lint      : ${{ needs.lint.result }}"
            echo "  typecheck : ${{ needs.typecheck.result }}"
            echo "  test      : ${{ needs.test.result }}"
            exit 1
          fi
          echo "All checks passed!"
