# FeatureForgeAI — CI Pipeline
# Stage 1: Code Quality (ESLint · tsc · Unit Tests · Security) — every PR + push to main
# Stage 2: Integration Tests (Vitest) — weekday schedule + post-merge

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'
      - 'reports/**'

schedules:
  - cron: '0 11 * * 1-5'       # 6:00 AM CDT / 5:00 AM CST Mon-Fri
    displayName: 'Weekday Morning Run'
    branches:
      include:
        - main
    always: true

# ─────────────────────────────────────────────────────────────────────────────
# VARIABLES
# ─────────────────────────────────────────────────────────────────────────────
variables:
  - group: FeatureForgeAI-Secrets   # DATABASE_URL, SESSION_SECRET, OPENAI_API_KEY

  - name: NODE_VERSION
    value: '20.x'

  - name: CI
    value: 'true'

  - name: FEATUREGEN_FAKE_AI
    value: '1'                      # Stub OpenAI calls — keeps tests fast and free

  - name: NODE_OPTIONS
    value: '--max-old-space-size=4096'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — CODE QUALITY
# Runs on every PR and push to main. All jobs run in parallel.
# ─────────────────────────────────────────────────────────────────────────────
stages:

  - stage: CodeQuality
    displayName: 'Code Quality Checks'
    condition: |
      or(
        eq(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.Reason'], 'IndividualCI'),
        eq(variables['Build.Reason'], 'BatchedCI')
      )
    jobs:

      # ── JOB 1: ESLint ────────────────────────────────────────────────────
      - job: Lint
        displayName: 'ESLint'
        timeoutInMinutes: 15
        pool:
          name: managed-pool-cus-001
          demands:
            - ImageOverride -equals windows-2025

        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - powershell: |
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
            displayName: 'npm ci'

          - powershell: npm run lint
            displayName: 'Run ESLint'

      # ── JOB 2: TypeScript Type Check ─────────────────────────────────────
      - job: TypeCheck
        displayName: 'TypeScript Type Check'
        timeoutInMinutes: 15
        pool:
          name: managed-pool-cus-001
          demands:
            - ImageOverride -equals windows-2025

        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - powershell: |
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
            displayName: 'npm ci'

          - powershell: npm run check   # tsc --noEmit
            displayName: 'tsc --noEmit'

      # ── JOB 3: Unit Tests (Vitest) ────────────────────────────────────────
      - job: UnitTests
        displayName: 'Unit Tests (Vitest)'
        timeoutInMinutes: 15
        pool:
          name: managed-pool-cus-001
          demands:
            - ImageOverride -equals windows-2025

        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - powershell: |
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
            displayName: 'npm ci'

          - powershell: npm run test:coverage
            displayName: 'Run Unit Tests'
            env:
              CI: $(CI)
              FEATUREGEN_FAKE_AI: $(FEATUREGEN_FAKE_AI)
              DATABASE_URL: $(DATABASE_URL)

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              failTaskOnFailedTests: true
              testRunTitle: 'Unit Tests - $(Build.SourceBranchName)'

          - task: PublishCodeCoverageResults@1
            displayName: 'Publish Coverage Report'
            condition: always()
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '**/coverage/cobertura-coverage.xml'

      # ── JOB 4: Security Check ─────────────────────────────────────────────
      - job: SecurityCheck
        displayName: 'Security Check'
        timeoutInMinutes: 15
        pool:
          name: managed-pool-cus-001
          demands:
            - ImageOverride -equals windows-2025

        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - powershell: |
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
            displayName: 'npm ci'

          - powershell: npm run security-check
            displayName: 'Run Security Check'

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — INTEGRATION TESTS
# Skipped on PRs. Runs post-merge and on weekday schedule.
# ─────────────────────────────────────────────────────────────────────────────

  - stage: IntegrationTests
    displayName: 'Integration Tests (Vitest)'
    dependsOn: CodeQuality
    condition: |
      and(
        ne(variables['Build.Reason'], 'PullRequest'),
        in(dependencies.CodeQuality.result, 'Succeeded', 'Skipped')
      )

    jobs:
      - job: IntegrationTests
        displayName: 'Integration Tests'
        timeoutInMinutes: 30
        pool:
          name: managed-pool-cus-001
          demands:
            - ImageOverride -equals windows-2025

        steps:
          - task: NodeTool@0
            displayName: 'Use Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - task: Cache@2
            displayName: 'Cache npm'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              path: '$(Pipeline.Workspace)/.npm'

          - powershell: |
              npm ci --cache "$(Pipeline.Workspace)/.npm" --prefer-offline
            displayName: 'npm ci'

          - powershell: npm run test:integration
            displayName: 'Run Integration Tests'
            env:
              CI: $(CI)
              DATABASE_URL: $(DATABASE_URL)
              SESSION_SECRET: $(SESSION_SECRET)
              FEATUREGEN_FAKE_AI: $(FEATUREGEN_FAKE_AI)

          - task: PublishTestResults@2
            displayName: 'Publish Integration Test Results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              failTaskOnFailedTests: false
              testRunTitle: 'Integration Tests - $(Build.SourceBranchName)'
